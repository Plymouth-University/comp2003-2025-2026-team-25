services:
  # Our Python Backend Service
  backend:
    # Build the image locally from the Dockerfile in this directory. This
    # ensures changes (like the Python base image bump) are picked up instead
    # of always pulling the remote "latest" image from Docker Hub.
    build: .
    image: okyanusalbas/qtrobot-backend:latest
    # when build: is specified, pull_policy is ignored. If you ever switch
    # back to pulling, use "if-not-present" instead of always.
    # pull_policy: always
    container_name: qtrobot-backend-container
    ports:
      - "8000:8000"  # Map port 8000 on your machine to port 8000 in the container
    volumes:
      - .:/app  # This mounts the current directory into the container, so code changes are reflected instantly
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Keycloak Authentication Service
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: qtrobot-keycloak-container
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    ports:
      - "8080:8080"  # Map port 8080 for the Keycloak UI
    volumes:
      # Mount local Keycloak export(s) so they can be imported automatically
      - ./keycloak:/opt/keycloak/data/import
    # Import any realm JSON files from /opt/keycloak/data/import on startup
    command:
      - start-dev
      - --import-realm
